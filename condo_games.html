    <script>
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        const lines = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            if (lines.length === 0) {
                for (let i = 0; i < 90; i++) {
                    lines.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        len: Math.random() * 150 + 60,
                        speed: Math.random() * 1.5 + 0.4,
                        opacity: Math.random() * 0.15 + 0.02,
                        width: Math.random() * 1 + 0.5
                    });
                }
            }
        }

        resize();
        window.addEventListener("resize", resize);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            lines.forEach(line => {
                let g = ctx.createLinearGradient(line.x, line.y, line.x, line.y + line.len);
                g.addColorStop(0, "transparent");
                g.addColorStop(0.8, `rgba(239, 68, 68, ${line.opacity})`);
                g.addColorStop(1, `rgba(254, 114, 114, ${line.opacity * 1.5})`);

                ctx.strokeStyle = g;
                ctx.lineWidth = line.width;
                ctx.beginPath();
                ctx.moveTo(line.x, line.y);
                ctx.lineTo(line.x, line.y + line.len);
                ctx.stroke();

                line.y += line.speed;
                if (line.y > canvas.height) {
                    line.y = -line.len;
                    line.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
